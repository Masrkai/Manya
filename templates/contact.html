{{define "contact_content"}}
<section>
    <div class="container" style="max-width: 600px;">
        <h2>Whispers in the <span style="color: var(--accent)">Dark</span></h2>
        <p style="text-align: center; margin-bottom: var(--space-lg);">Send a message through the void. All fields required—server decides validity.</p>
        
        <form hx-post="/contact" 
              hx-target="this" 
              hx-swap="outerHTML"
              hx-indicator="button">
            
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" 
                       id="name" 
                       name="name" 
                       required
                       placeholder="Your identity">
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" 
                       id="email" 
                       name="email" 
                       required
                       placeholder="your@domain.com">
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" 
                          name="message" 
                          required
                          placeholder="Speak into the void..."></textarea>
            </div>
            
            <button type="submit">Transmit</button>
        </form>
    </div>
</section>
{{end}}
