<form hx-post="/contact" 
      hx-target="this" 
      hx-swap="outerHTML"
      hx-indicator="button">

    {{if .Error}}
    <div class="error-message">
        {{.Error}}
    </div>
    {{end}}
    
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" 
               id="name" 
               name="name" 
               required
               value="{{.Name}}"
               placeholder="Your identity">
    </div>
    
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" 
               id="email" 
               name="email" 
               required
               value="{{.Email}}"
               placeholder="your@domain.com">
    </div>
    
    <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" 
                  name="message" 
                  required
                  placeholder="Speak into the void...">{{.Msg}}</textarea>
    </div>
    
    <button type="submit">Transmit</button>
</form>
